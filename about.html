  <style>
    /* 以下為 about.html 專屬樣式，不影響其他頁面 */
    .about-section {
      padding: 100px 0 80px;
    }
    .about-title {
      font-size: 2.2rem;
      font-weight: 700;
      margin-bottom: 60px;
      position: relative;
      display: inline-block;
      letter-spacing: 2px;
    }
    .about-title::after {
      content: '';
      position: absolute;
      bottom: -15px;
      left: 50%;
      transform: translateX(-50%);
      width: 40px;
      height: 3px;
      background-color: #212529;
      border-radius: 2px;
    }
    .info-block {
      padding: 40px 30px;
      background: #ffffff;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.04);
      height: 100%;
      transition: all 0.3s ease;
      border: 1px solid rgba(0,0,0,0.02);
    }
    .info-block:hover {
      transform: translateY(-5px);
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.08);
    }
    .info-label {
      font-size: 1.4rem;
      font-weight: 700;
      margin-bottom: 20px;
      color: #212529;
    }
    .info-content {
      font-size: 1.05rem;
      color: #6c757d;
      line-height: 1.8;
      font-weight: 400;
      margin-bottom: 0;
    }
  </style>
</head>
