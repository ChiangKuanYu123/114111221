  <main class="container my-5 pt-5">
    <h2 class="text-center fw-bold mb-5">聯絡我</h2>
    <div class="row g-4">
      <div class="col-md-5">
        <div class="card shadow-sm p-4 h-100 border-custom">
          <h4>📬 聯絡資訊</h4>
          <ul class="list-unstyled mt-3">
            <li class="mb-2"><strong>姓名：</strong>江冠佑</li>
            <li class="mb-2"><strong>學號：</strong>114111221</li>
            <li class="mb-2"><strong>Email：</strong>114111221@student.edu.tw</li>
            <li class="mb-2"><strong>電話：</strong>0912-345-678</li>
          </ul>
          <button class="btn btn-custom mt-3" data-bs-toggle="modal" data-bs-target="#contactModal">查看注意事項</button>
        </div>
      </div>
      <div class="col-md-7">
        <div class="card shadow-sm p-4">
          <h4>📝 留言表單</h4>
          <form class="mt-3">
            <div class="mb-3">
              <label for="name" class="form-label">您的姓名</label>
              <input type="text" class="form-control" id="name" placeholder="請輸入姓名">
            </div>
            <div class="mb-3">
              <label for="email" class="form-label">Email</label>
              <input type="email" class="form-control" id="email" placeholder="name@example.com">
            </div>
            <div class="mb-3">
              <label for="message" class="form-label">留言內容</label>
              <textarea class="form-control" id="message" rows="4" placeholder="請輸入您的訊息..."></textarea>
            </div>
            <button type="submit" class="btn btn-custom">送出訊息</button>
          </form>
        </div>
      </div>
    </div>
  </main>

  <div class="modal fade" id="contactModal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">注意事項</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">本表單僅為期末專案練習，不會實際寄送郵件。感謝您的填寫！</div>
